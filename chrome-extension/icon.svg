<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background circle (baseball white) -->
  <circle cx="64" cy="64" r="60" fill="#f5f0e8" stroke="#ddd" stroke-width="1"/>

  <!-- Baseball stitching curves (red) -->
  <!-- Left seam -->
  <path d="M 34 30 C 20 45, 20 83, 34 98" fill="none" stroke="#cc2200" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right seam -->
  <path d="M 94 30 C 108 45, 108 83, 94 98" fill="none" stroke="#cc2200" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Stitch marks on left seam -->
  <line x1="30" y1="44" x2="38" y2="46" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="54" x2="35" y2="54" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="64" x2="35" y2="64" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="74" x2="35" y2="74" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="84" x2="38" y2="82" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>

  <!-- Stitch marks on right seam -->
  <line x1="90" y1="44" x2="98" y2="46" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="93" y1="54" x2="101" y2="54" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="93" y1="64" x2="101" y2="64" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="93" y1="74" x2="101" y2="74" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="84" x2="98" y2="82" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>

  <!-- Spreadsheet overlay (rounded rect) -->
  <rect x="36" y="42" width="56" height="46" rx="3" fill="white" fill-opacity="0.88" stroke="#2a7a2a" stroke-width="2"/>

  <!-- Spreadsheet header row -->
  <rect x="36" y="42" width="56" height="10" rx="3" fill="#2a7a2a"/>
  <rect x="36" y="48" width="56" height="4" fill="#2a7a2a"/>

  <!-- Header text dots (simulated columns) -->
  <rect x="42" y="45" width="10" height="3" rx="1" fill="white" fill-opacity="0.8"/>
  <rect x="56" y="45" width="10" height="3" rx="1" fill="white" fill-opacity="0.8"/>
  <rect x="70" y="45" width="10" height="3" rx="1" fill="white" fill-opacity="0.8"/>
  <rect x="84" y="45" width="5" height="3" rx="1" fill="white" fill-opacity="0.8"/>

  <!-- Grid lines horizontal -->
  <line x1="36" y1="62" x2="92" y2="62" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="72" x2="92" y2="72" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="82" x2="92" y2="82" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="54" y1="52" x2="54" y2="88" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="68" y1="52" x2="68" y2="88" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="82" y1="52" x2="82" y2="88" stroke="#2a7a2a" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Row label cells (dark) -->
  <rect x="36" y="52" width="18" height="10" fill="#e8f4e8" fill-opacity="0.9"/>
  <rect x="36" y="62" width="18" height="10" fill="#e8f4e8" fill-opacity="0.9"/>
  <rect x="36" y="72" width="18" height="10" fill="#e8f4e8" fill-opacity="0.9"/>
  <rect x="36" y="82" width="18" height="6" fill="#e8f4e8" fill-opacity="0.9"/>

  <!-- Data cells - some filled to look like numbers -->
  <rect x="57" y="54" width="8" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="71" y="54" width="8" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="57" y="64" width="8" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="71" y="64" width="5" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="57" y="74" width="6" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="71" y="74" width="8" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="85" y="54" width="4" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="85" y="64" width="4" height="4" rx="1" fill="#333" fill-opacity="0.25"/>
  <rect x="85" y="74" width="4" height="4" rx="1" fill="#333" fill-opacity="0.25"/>

  <!-- Outer circle border -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#999" stroke-width="2"/>
</svg>
